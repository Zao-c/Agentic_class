name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install test dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Public release audit
        run: python scripts/audit_public_release.py --strict
      - name: Test with coverage
        run: >-
          python -m pytest
          --cov=app
          --cov-fail-under=85
          --cov-report=term
          --cov-report=xml
          --junitxml=reports/pytest.xml

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build portable image
        run: docker build -t industrial-robot-course-agent:ci .
      - name: Run health smoke
        run: |
          docker run -d --name robot-tutor-ci -p 8000:8000 industrial-robot-course-agent:ci
          for i in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:8000/ready; then exit 0; fi
            sleep 2
          done
          docker logs robot-tutor-ci
          exit 1
