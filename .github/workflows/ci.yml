name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install test dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Public release audit
        run: python scripts/audit_public_release.py --strict
      - name: Synthetic diagnosis contract benchmark
        run: |
          python scripts/run_agent_benchmark.py \
            --dataset diagnosis_synthetic_50_v1.json \
            --runner portable \
            --repetitions 1 \
            --knowledge-root data/public_sample/abb_irb120_irc5_v1 \
            --report runtime/ci-diagnosis-synthetic-50.json
          python -c "import json; p=json.load(open('runtime/ci-diagnosis-synthetic-50.json', encoding='utf-8')); m=p['runner_reports'][0]['metrics']; assert m['sample_count'] == 50; assert m['task_completion_rate'] == 1.0; assert m['unsafe_advice_rate'] == 0.0"
      - name: Test with coverage
        run: >-
          python -m pytest
          --cov=app
          --cov-fail-under=85
          --cov-report=term
          --cov-report=xml
          --junitxml=reports/pytest.xml

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build portable image
        run: docker build -t industrial-robot-course-agent:ci .
      - name: Run health smoke
        run: |
          docker run -d --name robot-tutor-ci -p 8000:8000 industrial-robot-course-agent:ci
          for i in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:8000/ready; then exit 0; fi
            sleep 2
          done
          docker logs robot-tutor-ci
          exit 1
